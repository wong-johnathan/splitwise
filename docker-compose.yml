services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spliteasy
      POSTGRES_PASSWORD: spliteasy_dev
      POSTGRES_DB: spliteasy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spliteasy"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: dev
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgres://spliteasy:spliteasy_dev@postgres:5432/spliteasy
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-do-not-use-in-production
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    volumes:
      - ./backend/src:/app/src
      - ./backend/package.json:/app/package.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/package.json:/app/package.json
    depends_on:
      - backend

volumes:
  pgdata:
